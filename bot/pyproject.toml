[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = ["data", "webapp", ".venv"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "B",   # bugbear
    "UP",  # pyupgrade
    "RUF", # ruff-specific
]
ignore = [
    "E501",   # line too long (formatter handles it)
    "B008",   # FastAPI uses Depends() in defaults
    "RUF001", # we use Cyrillic literals on purpose
    "RUF002", # docstring Cyrillic
    "RUF003", # comment Cyrillic
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "-q"
testpaths = ["tests"]
